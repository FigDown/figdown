" y1="39.599999999999994" x2="494" y2="39.599999999999994" stroke="transparent" stroke-width="12"/><text x="502" y="43.599999999999994" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">Max cap</text><text x="502" y="43.599999999999994" font-size="11" text-anchor="start" fill="#ef4444">Max cap</text></g><g data-gline="21" data-gtop="-6" data-gbot="222" style="cursor:ns-resize"><line x1="-14" y1="187.8" x2="494" y2="187.8" stroke="#ef4444" stroke-width="2" stroke-dasharray="7 4"/><line x1="-14" y1="187.8" x2="494" y2="187.8" stroke="transparent" stroke-width="12"/><text x="502" y="191.8" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">Reserved</text><text x="502" y="191.8" font-size="11" text-anchor="start" fill="#ef4444">Reserved</text></g></g><metadata id="figdown-source" data-sha256="016a8adf44c3500b76f7c8d971c144057850da0899fe7b9d2cb1df00bae560ca"><![CDATA[
figdown 0.1 block
title "Partition map — a resource pool with global thresholds"

# The GENERIC partition-and-threshold map: one pool, N groups, global
# threshold lines shared by all (group-level scope; per-node scope exists
# for figures whose semantics are per-column). Instances of this category:
# buffer quotas, memory maps, watermark/level charts.
group pool "Resource pool (units)" gap=0
node g0 "Group 0" in=pool color=transparent
node g1 "Group 1" in=pool color=transparent
node g2 "Group 2" in=pool color=transparent
node g3 "Group 3" in=pool color=transparent
flow down
rank g0 g1 g2 g3
size g0 w=120 h=190
size g1 w=120 h=190
size g2 w=120 h=190
size g3 w=120 h=190

line "Max cap"                 in=pool at=80%
line "Reserved"  in=pool at=15%
fill 15% in=pool color=#a3c93a

]]></metadata></svg>