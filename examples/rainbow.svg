<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 608 650" width="608" height="650" font-family="system-ui,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#bbb" stroke-width="2"/></pattern></defs><g transform="translate(18,6)"><text x="0" y="16" font-size="15" font-weight="600">Rainbow rings — line order is the layer</text><g data-node="red" data-x="20" data-y="70" style="cursor:move"><ellipse cx="300" cy="350" rx="290" ry="288" fill="#ef4444" stroke="#ef4444"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="orange" data-x="60" data-y="110" style="cursor:move"><ellipse cx="300" cy="350" rx="250" ry="248" fill="#f97316" stroke="#f97316"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="yellow" data-x="100" data-y="150" style="cursor:move"><ellipse cx="300" cy="350" rx="210" ry="208" fill="#facc15" stroke="#facc15"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="green" data-x="140" data-y="190" style="cursor:move"><ellipse cx="300" cy="350" rx="170" ry="168" fill="#22c55e" stroke="#22c55e"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="blue" data-x="180" data-y="230" style="cursor:move"><ellipse cx="300" cy="350" rx="130" ry="128" fill="#3b82f6" stroke="#3b82f6"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="indigo" data-x="220" data-y="270" style="cursor:move"><ellipse cx="300" cy="350" rx="90" ry="88" fill="#6366f1" stroke="#6366f1"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="violet" data-x="260" data-y="310" style="cursor:move"><ellipse cx="300" cy="350" rx="50" ry="48" fill="#a855f7" stroke="#a855f7"/><text x="300" y="354.55" font-size="13" text-anchor="middle" fill="#1d1d1b"> </text></g><g data-node="core" data-x="290" data-y="340" style="cursor:move"><ellipse cx="300" cy="350" rx="20" ry="18" fill="#ffffff" stroke="#ffffff"/><text x="300" y="352.8" font-size="8" text-anchor="middle" fill="#1d1d1b">FigDown</text></g></g><metadata id="figdown-source" data-sha256="5025976cb989269fde24679ff60805756328fa6b3b437c42b581b218b8bbf44c"><![CDATA[
figdown 0.1 block
title "Rainbow rings — line order is the layer"

# Seven concentric ellipses. Earlier lines paint first (bottom), later
# lines paint on top — the ring effect needs no layer directives at all.

node red    " " shape=cloud color=#ef4444 stroke=#ef4444
size red    w=560 h=560
pin  red    at=20,20
node orange " " shape=cloud color=#f97316 stroke=#f97316
size orange w=480 h=480
pin  orange at=60,60
node yellow " " shape=cloud color=#facc15 stroke=#facc15
size yellow w=400 h=400
pin  yellow at=100,100
node green  " " shape=cloud color=#22c55e stroke=#22c55e
size green  w=320 h=320
pin  green  at=140,140
node blue   " " shape=cloud color=#3b82f6 stroke=#3b82f6
size blue   w=240 h=240
pin  blue   at=180,180
node indigo " " shape=cloud color=#6366f1 stroke=#6366f1
size indigo w=160 h=160
pin  indigo at=220,220
node violet " " shape=cloud color=#a855f7 stroke=#a855f7
size violet w=80 h=80
pin  violet at=260,260
node core   "FigDown" shape=cloud color=#ffffff stroke=#ffffff
size core   w=20 h=20
pin  core   at=290,290

]]></metadata></svg>