</text><text x="402.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">17</text><text x="425.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">18</text><text x="448.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">19</text><text x="471.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">20</text><text x="494.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">21</text><text x="517.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">22</text><text x="540.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">23</text><text x="563.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">24</text><text x="586.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">25</text><text x="609.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">26</text><text x="632.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">27</text><text x="655.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">28</text><text x="678.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">29</text><text x="701.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">30</text><text x="724.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">31</text><rect x="0" y="34" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="52.85" font-size="11" text-anchor="middle">Destination MAC</text><rect x="0" y="64" width="368" height="30" fill="#fff" stroke="#555"/><text x="184" y="82.85" font-size="11" text-anchor="middle">Destination MAC</text><rect x="368" y="64" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="82.85" font-size="11" text-anchor="middle">Source MAC</text><rect x="0" y="94" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="112.85" font-size="11" text-anchor="middle">Source MAC</text><rect x="0" y="124" width="368" height="30" fill="#dbeafe" stroke="#555" stroke-dasharray="5 3"/><text x="184" y="142.85" font-size="11" text-anchor="middle">TPID</text><title>Tag Protocol ID = 0x8100 when 802.1Q tag present</title><rect x="368" y="124" width="69" height="30" fill="#dbeafe" stroke="#555" stroke-dasharray="5 3"/><text x="402.5" y="142.85" font-size="11" text-anchor="middle">PCP</text><title>Priority Code Point (IEEE 802.1p QoS)</title><rect x="437" y="124" width="23" height="30" fill="#dbeafe" stroke="#555" stroke-dasharray="5 3"/><text x="448.5" y="142.5188172043011" font-size="10.053763440860214" text-anchor="middle">DEI</text><title>Drop Eligible Indicator</title><rect x="460" y="124" width="276" height="30" fill="#dbeafe" stroke="#555" stroke-dasharray="5 3"/><text x="598" y="142.85" font-size="11" text-anchor="middle">VID</text><title>VLAN Identifier (0-4094)</title><rect x="0" y="154" width="368" height="30" fill="#d1fae5" stroke="#555"/><text x="184" y="172.85" font-size="11" text-anchor="middle">EtherType</text><title>EtherType (&gt;=0x0600) or Length (&lt;0x0600)</title><rect x="368" y="154" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="172.85" font-size="11" text-anchor="middle">Payload (46-1500 bytes)</text><title>Data payload; minimum 46 bytes (padded if necessary)</title><rect x="0" y="184" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="202.85" font-size="11" text-anchor="middle">FCS</text><title>Frame Check Sequence — CRC-32 over DA, SA, tag (if present), EtherType, and Payload</title></g><metadata id="figdown-source" data-sha256="2685afd8d6f267bc512b184e654e9b04a03f1a6ea310b6d1e879c9b9db2d1933"><![CDATA[
figdown 0.1 bitfield
# Ethernet II (DIX) frame header — without preamble/SFD
# 802.1Q VLAN tag shown as optional fields (dashed border)
# Bit ruler: RFC-style MSB-first (bit 0 = leftmost)
bitfield eth "Ethernet II Frame Header" unit=32 numbering=msb0
field "Destination MAC" 48
field "Source MAC" 48
# 802.1Q tag (optional — present only when EtherType = 0x8100)
field TPID 16 optional color=#dbeafe note="Tag Protocol ID = 0x8100 when 802.1Q tag present"
field PCP 3 optional color=#dbeafe note="Priority Code Point (IEEE 802.1p QoS)"
field DEI 1 optional color=#dbeafe note="Drop Eligible Indicator"
field VID 12 optional color=#dbeafe note="VLAN Identifier (0-4094)"
# EtherType / Length
field EtherType 16 color=#d1fae5 note="EtherType (>=0x0600) or Length (<0x0600)"
field "Payload (46-1500 bytes)" * note="Data payload; minimum 46 bytes (padded if necessary)"
field FCS 32 note="Frame Check Sequence — CRC-32 over DA, SA, tag (if present), EtherType, and Payload"

]]></metadata></svg>