<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 326" width="395" height="326" font-family="system-ui,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#bbb" stroke-width="2"/></pattern></defs><g transform="translate(18,6)"><text x="0" y="16" font-size="15" font-weight="600" font-family="var(--sans)">3-State Cycle with Conditional Transitions</text><line x1="195.39764705882354" y1="136" x2="98.60235294117646" y2="270" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><line x1="121.19999999999999" y1="288" x2="310" y2="288" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><line x1="324.63529411764705" y1="270" x2="222.16470588235293" y2="136" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><line x1="310" y1="288" x2="121.19999999999999" y2="288" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><line x1="98.60235294117646" y1="270" x2="195.39764705882354" y2="136" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><g data-node="idle" data-x="180" data-y="100" style="cursor:move"><rect x="180" y="100" width="56.8" height="36" rx="14" fill="#dbeafe" stroke="#8a8880" stroke-width="1.8"/><text x="208.4" y="122.55" font-size="13" text-anchor="middle" fill="#1d1d1b">IDLE</text></g><g data-node="active" data-x="50" data-y="270" style="cursor:move"><rect x="50" y="270" width="71.2" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="85.6" y="292.55" font-size="13" text-anchor="middle" fill="#1d1d1b">ACTIVE</text></g><g data-node="wait" data-x="310" data-y="270" style="cursor:move"><rect x="310" y="270" width="56.8" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="338.4" y="292.55" font-size="13" text-anchor="middle" fill="#1d1d1b">WAIT</text></g><text x="154" y="207" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">cond1</text><text x="154" y="207" font-size="11" text-anchor="start" fill="#555">cond1</text><text x="215.6" y="283" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">cond2</text><text x="215.6" y="283" font-size="11" text-anchor="middle" fill="#555">cond2</text><text x="280.4" y="207" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">reset</text><text x="280.4" y="207" font-size="11" text-anchor="start" fill="#555">reset</text><text x="215.6" y="283" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">retry</text><text x="215.6" y="283" font-size="11" text-anchor="middle" fill="#555">retry</text><text x="154" y="207" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">abort</text><text x="154" y="207" font-size="11" text-anchor="start" fill="#555">abort</text></g><metadata id="figdown-source" data-sha256="aa8006490fd5b2dcd0360edf30ad90be48baca44da09919d9ee76a9a287f5ddf"><![CDATA[
figdown 0.1 flowchart
title "3-State Cycle with Conditional Transitions"

node idle   "IDLE"    shape=rounded color=#dbeafe
node active "ACTIVE"  shape=rounded
node wait   "WAIT"    shape=rounded

flow down

edge idle -[cond1]-> active
edge active -[cond2]-> wait
edge wait -[reset]-> idle
edge wait -[retry]-> active
edge active -[abort]-> idle

# --- layout state-a ---
# Triangular arrangement so cycle edges are spatially distinct from back-edges.
# idle at top-centre; active at bottom-left; wait at bottom-right.
pin idle   at=180,50
pin active at=50,220
pin wait   at=310,220

]]></metadata></svg>