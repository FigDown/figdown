y="270" width="56.8" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="338.4" y="292.55" font-size="13" text-anchor="middle" fill="#1d1d1b">WAIT</text></g><text x="151.1627987455107" y="204.9505393291101" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">cond1</text><text x="151.1627987455107" y="204.9505393291101" font-size="11" text-anchor="start" fill="#555">cond1</text><text x="215.6" y="279.5" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">cond2</text><text x="215.6" y="279.5" font-size="11" text-anchor="middle" fill="#555">cond2</text><text x="280.4" y="207" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">reset</text><text x="280.4" y="207" font-size="11" text-anchor="start" fill="#555">reset</text><text x="215.6" y="286.5" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">retry</text><text x="215.6" y="286.5" font-size="11" text-anchor="middle" fill="#555">retry</text><text x="156.8372012544893" y="209.0494606708899" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">abort</text><text x="156.8372012544893" y="209.0494606708899" font-size="11" text-anchor="start" fill="#555">abort</text></g><metadata id="figdown-source" data-sha256="aa8006490fd5b2dcd0360edf30ad90be48baca44da09919d9ee76a9a287f5ddf"><![CDATA[
figdown 0.1 flowchart
title "3-State Cycle with Conditional Transitions"

node idle   "IDLE"    shape=rounded color=#dbeafe
node active "ACTIVE"  shape=rounded
node wait   "WAIT"    shape=rounded

flow down

edge idle -[cond1]-> active
edge active -[cond2]-> wait
edge wait -[reset]-> idle
edge wait -[retry]-> active
edge active -[abort]-> idle

# --- layout state-a ---
# Triangular arrangement so cycle edges are spatially distinct from back-edges.
# idle at top-centre; active at bottom-left; wait at bottom-right.
pin idle   at=180,50
pin active at=50,220
pin wait   at=310,220

]]></metadata></svg>