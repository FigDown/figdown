-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">contains</text><text x="341.9" y="103" font-size="11" text-anchor="middle" fill="#555">contains</text><text x="323.916" y="104" font-size="10" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">1</text><text x="323.916" y="104" font-size="10" text-anchor="middle" fill="#555">1</text><text x="359.884" y="104" font-size="10" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">N</text><text x="359.884" y="104" font-size="10" text-anchor="middle" fill="#555">N</text><text x="327.5" y="189.84954864593783" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">appears in</text><text x="327.5" y="189.84954864593783" font-size="11" text-anchor="middle" fill="#555">appears in</text><text x="300.3" y="212.94784353059177" font-size="10" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">1</text><text x="300.3" y="212.94784353059177" font-size="10" text-anchor="middle" fill="#555">1</text><text x="354.7" y="168.75125376128386" font-size="10" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">N</text><text x="354.7" y="168.75125376128386" font-size="10" text-anchor="middle" fill="#555">N</text></g><metadata id="figdown-source" data-sha256="f8d7e07235c690b396534fdac52e3f549ba37039695fed5bbdd210b96e02fe36"><![CDATA[
figdown 0.1 block
title "Entity-relationship skeleton: orders domain"

# Blocks-first ERD pattern:
#   entity = node; attributes = label lines (\n-separated)
#   first label line = entity name, subsequent lines = attribute list
#   PK/FK noted as plain text in the attribute list
#   relationships = edges with inline verb and endpoint cardinality labels

node customer "Customer\n---\nPK customer_id\nname\nemail" shape=rounded color=#dbeafe
node order    "Order\n---\nPK order_id\nFK customer_id\nordered_at\nstatus"    shape=rounded color=#dcfce7
node item     "Item\n---\nPK item_id\nname\nunit_price"                        shape=rounded color=#fef9c3
node order_line "OrderLine\n---\nPK FK order_id\nPK FK item_id\nqty\nline_total" shape=rounded color=#f3e8ff

flow right

# relationships: cardinality at each endpoint, verb on the line
edge customer [1] -[places]-> [N] order
edge order    [1] -[contains]-> [N] order_line
edge item     [1] -[appears in]-> [N] order_line

# --- layout (materialized; delete freely, structure above is complete) ---
# Top row: Customer → Order → OrderLine (left to right, same y).
# Item below Order in the second row; edge to OrderLine goes up-right.
# Node widths are auto-sized; gaps approximate GAPX=56 px.
# y0=30 (title present) so canvas y = 50 + p.fy for ungrouped pins.
pin customer    at=0,0
pin order       at=185,0
pin order_line  at=370,0
pin item        at=185,170

]]></metadata></svg>