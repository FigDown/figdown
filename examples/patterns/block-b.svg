cursor:move"><rect x="550" y="200" width="49.6" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="574.8" y="222.55" font-size="13" text-anchor="middle" fill="#1d1d1b">out</text></g><g data-node="proc-x" data-x="225.60000000000002" data-y="100" style="cursor:move"><rect x="225.60000000000002" y="100" width="92.8" height="36" fill="#bfdbfe" stroke="#8a8880"/><text x="272" y="122.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Process X</text></g><g data-node="intr" data-x="225.60000000000002" data-y="197" style="cursor:move"><rect x="225.60000000000002" y="197" width="92.8" height="36" rx="14" fill="#fca5a5" stroke="#8a8880" stroke-width="1.8"/><text x="272" y="219.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Interrupt</text></g><g data-node="proc-y" data-x="225.60000000000002" data-y="277" style="cursor:move"><rect x="225.60000000000002" y="277" width="92.8" height="36" fill="#bfdbfe" stroke="#8a8880"/><text x="272" y="299.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Process Y</text></g><text x="197.6" y="105.07478260869564" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">ref</text><text x="197.6" y="105.07478260869564" font-size="11" text-anchor="middle" fill="#555">ref</text><text x="272" y="161.5" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">ptr</text><text x="272" y="161.5" font-size="11" text-anchor="middle" fill="#555">ptr</text><text x="356.4" y="104.5867088607595" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">feedback</text><text x="356.4" y="104.5867088607595" font-size="11" text-anchor="middle" fill="#555">feedback</text><text x="375.3" y="370" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">interrupt</text><text x="375.3" y="370" font-size="11" text-anchor="middle" fill="#555">interrupt</text><text x="203" y="348" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">up-path</text><text x="203" y="348" font-size="11" text-anchor="middle" fill="#555">up-path</text></g><metadata id="figdown-source" data-sha256="e3486b82d269992581a8d00d48dd724552c7e6cec044d75d89bf764c0dfe3ddc"><![CDATA[
figdown 0.1 block
title "Sibling groups with cross-tier feedback edges"

# A subsystem group and a store group side by side (v0.1 nesting is one
# level: nodes in groups), plus a separate process tier below.  Colored
# feedback edges cross the tiers in opposite directions:
#   subsystem group { unit C } · store group { unit A, unit B }
#   process tier { process X, process Y, interrupt node }
#   edge C -> process X  (down-path)
#   edge process X -> unit B  (feedback, up-path)
#   edge process Y -> interrupt  (cross-process trigger)
#   edge interrupt -> unit C  (feedback, up-path, dashed)

group outer "Subsystem A"

group inner "Store Group"
node unit-a "Unit A" in=inner
node unit-b "Unit B" in=inner

node unit-c "Unit C" in=outer

node in-port  "in"  shape=rounded
node out-port "out" shape=rounded

group procs "Process Tier"
node proc-x "Process X" in=procs color=#bfdbfe
node intr   "Interrupt"  in=procs color=#fca5a5 shape=rounded
node proc-y "Process Y"  in=procs color=#bfdbfe

flow right
rank unit-a unit-b
rank proc-x intr proc-y

edge in-port  -> unit-c
edge unit-c   -> out-port
edge unit-c -[ref]-> proc-x
edge unit-c -[ptr]-> unit-a
edge proc-x -[feedback]-> unit-b style=dashed
edge proc-y   -> intr
edge intr -[interrupt]-> unit-c style=dashed
edge proc-y -[up-path]-> unit-c

# --- layout block-b ---
# Pin in/out ports to left and right margins so they flank the main cluster.
pin in-port  at=20,180
pin out-port at=550,180

]]></metadata></svg>