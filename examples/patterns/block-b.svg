="378.95000000000005" y2="130" stroke="#555" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arr)"/><line x1="272" y1="210" x2="272" y2="166" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><line x1="225.6" y1="148" x2="169.6" y2="148" stroke="#555" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arr)"/><line x1="240.95" y1="210" x2="165.05" y2="166" stroke="#555" stroke-width="1.6" marker-end="url(#arr)"/><g data-node="unit-a" data-x="374.40000000000003" data-y="50" style="cursor:move"><rect x="374.40000000000003" y="50" width="71.2" height="36" fill="#fff" stroke="#8a8880"/><text x="410.00000000000006" y="72.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Unit A</text></g><g data-node="unit-b" data-x="374.40000000000003" data-y="130" style="cursor:move"><rect x="374.40000000000003" y="130" width="71.2" height="36" fill="#fff" stroke="#8a8880"/><text x="410.00000000000006" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Unit B</text></g><g data-node="unit-c" data-x="98.4" data-y="130" style="cursor:move"><rect x="98.4" y="130" width="71.2" height="36" fill="#fff" stroke="#8a8880"/><text x="134" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Unit C</text></g><g data-node="in-port" data-x="20" data-y="230" style="cursor:move"><rect x="20" y="230" width="42.4" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="41.2" y="252.55" font-size="13" text-anchor="middle" fill="#1d1d1b">in</text></g><g data-node="out-port" data-x="550" data-y="230" style="cursor:move"><rect x="550" y="230" width="49.6" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="574.8" y="252.55" font-size="13" text-anchor="middle" fill="#1d1d1b">out</text></g><g data-node="proc-x" data-x="225.60000000000002" data-y="50" style="cursor:move"><rect x="225.60000000000002" y="50" width="92.8" height="36" fill="#bfdbfe" stroke="#8a8880"/><text x="272" y="72.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Process X</text></g><g data-node="intr" data-x="225.60000000000002" data-y="130" style="cursor:move"><rect x="225.60000000000002" y="130" width="92.8" height="36" rx="14" fill="#fca5a5" stroke="#8a8880" stroke-width="1.8"/><text x="272" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Interrupt</text></g><g data-node="proc-y" data-x="225.60000000000002" data-y="210" style="cursor:move"><rect x="225.60000000000002" y="210" width="92.8" height="36" fill="#bfdbfe" stroke="#8a8880"/><text x="272" y="232.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Process Y</text></g><text x="203" y="103" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">ref</text><text x="203" y="103" font-size="11" text-anchor="middle" fill="#555">ref</text><text x="272" y="103" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">ptr</text><text x="272" y="103" font-size="11" text-anchor="middle" fill="#555">ptr</text><text x="341" y="103" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">feedback</text><text x="341" y="103" font-size="11" text-anchor="middle" fill="#555">feedback</text><text x="197.6" y="143" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">interrupt</text><text x="197.6" y="143" font-size="11" text-anchor="middle" fill="#555">interrupt</text><text x="203" y="183" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">up-path</text><text x="203" y="183" font-size="11" text-anchor="middle" fill="#555">up-path</text></g><metadata id="figdown-source" data-sha256="701cf96a1cf24b500a8b140d7e75ee6124379a3cd9b428f6b5b8aeb74fde4db8"><![CDATA[
figdown 0.1 block
title "Nested containment with cross-tier feedback edges"

# Outer region holds an inner sub-group (two sibling stores) and a
# state table.  A separate process tier sits below.  Colored feedback
# edges cross both tiers in opposite directions, capturing the pattern:
#   outer group { inner group { unit A, unit B }, unit C }
#   process tier { process X, process Y, interrupt node }
#   edge C -> process X  (down-path)
#   edge process X -> unit B  (feedback, up-path)
#   edge process Y -> interrupt  (cross-process trigger)
#   edge interrupt -> unit C  (feedback, up-path, dashed)

group outer "Subsystem A"

group inner "Store Group" in=outer
node unit-a "Unit A" in=inner
node unit-b "Unit B" in=inner

node unit-c "Unit C" in=outer

node in-port  "in"  shape=rounded
node out-port "out" shape=rounded

group procs "Process Tier"
node proc-x "Process X" in=procs color=#bfdbfe
node intr   "Interrupt"  in=procs color=#fca5a5 shape=rounded
node proc-y "Process Y"  in=procs color=#bfdbfe

flow right
rank unit-a unit-b
rank proc-x intr proc-y

edge in-port  -> unit-c
edge unit-c   -> out-port
edge unit-c -[ref]-> proc-x
edge unit-c -[ptr]-> unit-a
edge proc-x -[feedback]-> unit-b style=dashed
edge proc-y   -> intr
edge intr -[interrupt]-> unit-c style=dashed
edge proc-y -[up-path]-> unit-c

# --- layout block-b ---
# Pin in/out ports to left and right margins so they flank the main cluster.
pin in-port  at=20,180
pin out-port at=550,180

]]></metadata></svg>