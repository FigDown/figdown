troke="#8a8880"/><text x="39.2" y="232.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Stage 1</text></g><g data-node="r3s2" data-x="134.4" data-y="210" style="cursor:move"><rect x="134.4" y="210" width="78.4" height="36" fill="#fff" stroke="#8a8880"/><text x="173.60000000000002" y="232.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Stage 2</text></g><g data-node="r3s3" data-x="268.8" data-y="210" style="cursor:move"><rect x="268.8" y="210" width="78.4" height="36" fill="#fff" stroke="#8a8880"/><text x="308" y="232.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Stage 3</text></g><g data-node="collector" data-x="403.20000000000005" data-y="130" style="cursor:move"><ellipse cx="449.6" cy="148" rx="46.4" ry="18" fill="#fff" stroke="#8a8880"/><text x="449.6" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Collector</text></g></g><metadata id="figdown-source" data-sha256="b7627b4cff8ec62cff4485308456d9c410f3242ea2b7bd69618bae1bbd678a72"><![CDATA[
figdown 0.1 block
title "Parallel-row fan-in to collector"

# Three independent rows of staged blocks; each row flows right and
# converges into a single collector.  Captures the structural pattern:
#   N rows × M stages  →  fan-in  →  1 collector

group row1 "Lane 1"
node r1s1 "Stage 1" in=row1
node r1s2 "Stage 2" in=row1
node r1s3 "Stage 3" in=row1

group row2 "Lane 2"
node r2s1 "Stage 1" in=row2
node r2s2 "Stage 2" in=row2
node r2s3 "Stage 3" in=row2

group row3 "Lane 3"
node r3s1 "Stage 1" in=row3
node r3s2 "Stage 2" in=row3
node r3s3 "Stage 3" in=row3

node collector "Collector" shape=ellipse

flow right
rank r1s1 r2s1 r3s1

edge r1s1 -> r1s2
edge r1s2 -> r1s3
edge r2s1 -> r2s2
edge r2s2 -> r2s3
edge r3s1 -> r3s2
edge r3s2 -> r3s3

edge r1s3 -> collector
edge r2s3 -> collector
edge r3s3 -> collector

]]></metadata></svg>