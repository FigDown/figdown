 fill="#6f6e69">16</text><text x="379.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">15</text><text x="402.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">14</text><text x="425.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">13</text><text x="448.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">12</text><text x="471.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">11</text><text x="494.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">10</text><text x="517.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">9</text><text x="540.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">8</text><text x="563.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">7</text><text x="586.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">6</text><text x="609.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">5</text><text x="632.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">4</text><text x="655.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">3</text><text x="678.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">2</text><text x="701.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">1</text><text x="724.5" y="59" font-size="8.5" text-anchor="middle" fill="#6f6e69">0</text><rect x="0" y="64" width="92" height="30" fill="#fff" stroke="#555"/><text x="46" y="82.85" font-size="11" text-anchor="middle">TYPE</text><rect x="92" y="64" width="23" height="30" fill="#fff" stroke="#555"/><text x="103.5" y="81.45" font-size="7" text-anchor="middle">FLAG_B</text><rect x="115" y="64" width="23" height="30" fill="#fff" stroke="#555"/><text x="126.5" y="81.45" font-size="7" text-anchor="middle">FLAG_A</text><rect x="138" y="64" width="230" height="30" fill="#fff" stroke="#555"/><text x="253" y="82.85" font-size="11" text-anchor="middle">Reserved</text><rect x="368" y="64" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="82.85" font-size="11" text-anchor="middle">FIELD_A</text><rect x="0" y="94" width="184" height="30" fill="#fff" stroke="#555"/><text x="92" y="112.85" font-size="11" text-anchor="middle">Reserved</text><rect x="184" y="94" width="552" height="30" fill="#fff" stroke="#555"/><text x="460" y="112.85" font-size="11" text-anchor="middle">FIELD_B</text><rect x="0" y="124" width="368" height="30" fill="#fff" stroke="#555"/><text x="184" y="142.85" font-size="11" text-anchor="middle">FIELD_D</text><rect x="368" y="124" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="142.85" font-size="11" text-anchor="middle">FIELD_C</text><rect x="0" y="154" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="172.85" font-size="11" text-anchor="middle">DATA</text><title>variable-length payload; one unit shown as representative row</title></g><metadata id="figdown-source" data-sha256="a2bb81931c89f002d5263fb0b537f0aa664053d2d81870abf25a4f4007dfbf2a"><![CDATA[
figdown 0.1 bitfield
# Multi-word descriptor/entry — four 32-bit words, lsb0 numbering (ruler 31..0)
title Multi-Word Descriptor Pattern

bitfield descriptor "Multi-Word Descriptor" unit=32
# Word 0: identifier in upper half + flag cluster + small type code in low bits
field TYPE 4
field FLAG_B:1, FLAG_A:1
field Reserved 10
field FIELD_A 16
wrap
# Word 1: wide bitmap/trace field across upper bits + small reserved in lower bits
field Reserved 8
field FIELD_B 24
wrap
# Word 2: two medium-width fields covering the full word
field FIELD_D 16
field FIELD_C 16
wrap
# Word 3: full-word payload/data slot (variable length shown as one unit)
field DATA * note="variable-length payload; one unit shown as representative row"

]]></metadata></svg>