dle">Identification</text><rect x="368" y="64" width="69" height="30" fill="#fff" stroke="#555"/><text x="402.5" y="82.85" font-size="11" text-anchor="middle">Flags</text><rect x="437" y="64" width="299" height="30" fill="#fff" stroke="#555"/><text x="586.5" y="82.85" font-size="11" text-anchor="middle">Fragment Offset</text><rect x="0" y="94" width="184" height="30" fill="#fff" stroke="#555"/><text x="92" y="112.85" font-size="11" text-anchor="middle">TTL</text><rect x="184" y="94" width="184" height="30" fill="#fff" stroke="#555"/><text x="276" y="112.85" font-size="11" text-anchor="middle">Protocol</text><rect x="368" y="94" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="112.85" font-size="11" text-anchor="middle">Header Checksum</text><rect x="0" y="124" width="736" height="30" fill="#dbeafe" stroke="#555"/><text x="368" y="142.85" font-size="11" text-anchor="middle">Source Address</text><rect x="0" y="154" width="736" height="30" fill="#dbeafe" stroke="#555"/><text x="368" y="172.85" font-size="11" text-anchor="middle">Destination Address</text><rect x="0" y="184" width="736" height="30" fill="#fff" stroke="#555" stroke-dasharray="5 3"/><text x="368" y="202.85" font-size="11" text-anchor="middle">Options (if IHL &gt; 5)</text><rect x="0" y="214" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="232.85" font-size="11" text-anchor="middle">Payload</text><title>&quot;variable</title></g><metadata id="figdown-source" data-sha256="5c501caadf959bba710b5daf76d49c843ee4ec425e19af4b3d8f39012e8a43ef"><![CDATA[
figdown 0.1 bitfield

# IPv4 Header — RFC 791
# Each row is 32 bits, MSB-0 numbering (bit 0 at left).

bitfield ipv4 "IPv4 Header (RFC 791)" unit=32 numbering=msb0

# Row 1: Version · IHL · DSCP/ECN · Total Length
field Version 4
field IHL 4
field "DSCP/ECN" 8 note="originally ToS, RFC 2474"
field "Total Length" 16

# Row 2: Identification · Flags · Fragment Offset
field Identification 16
field Flags 3
field "Fragment Offset" 13

# Row 3: TTL · Protocol · Header Checksum
field TTL 8
field Protocol 8
field "Header Checksum" 16

# Row 4: Source Address (coloured to distinguish address rows)
field "Source Address" 32 color=#dbeafe

# Row 5: Destination Address
field "Destination Address" 32 color=#dbeafe

# Row 6: Options (present only when IHL > 5)
field "Options (if IHL > 5)" 32 optional

# Row 7: Payload (variable length; one unit shown as representative row)
field Payload 32 note="variable length; remainder of datagram after the header"

]]></metadata></svg>