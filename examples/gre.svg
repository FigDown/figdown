ht="30" fill="#fff" stroke="#555"/><text x="149.5" y="52.85" font-size="11" text-anchor="middle">Recur</text><rect x="184" y="34" width="115" height="30" fill="#fff" stroke="#555"/><text x="241.5" y="52.85" font-size="11" text-anchor="middle">Flags</text><rect x="299" y="34" width="69" height="30" fill="#fff" stroke="#555"/><text x="333.5" y="52.85" font-size="11" text-anchor="middle">Ver</text><rect x="368" y="34" width="368" height="30" fill="#dbeafe" stroke="#555"/><text x="552" y="52.85" font-size="11" text-anchor="middle">Protocol Type</text><title>EtherType of the payload</title><rect x="0" y="64" width="368" height="30" fill="#fff" stroke="#555" stroke-dasharray="5 3"/><text x="184" y="82.85" font-size="11" text-anchor="middle">Checksum (optional)</text><title>present if C = 1</title><rect x="368" y="64" width="368" height="30" fill="#fff" stroke="#555" stroke-dasharray="5 3"/><text x="552" y="82.85" font-size="11" text-anchor="middle">Offset (optional)</text><rect x="0" y="94" width="736" height="30" fill="#fef9c3" stroke="#555" stroke-dasharray="5 3"/><text x="368" y="112.85" font-size="11" text-anchor="middle">Key (optional)</text><title>present if K = 1</title><rect x="0" y="124" width="736" height="30" fill="#fff" stroke="#555" stroke-dasharray="5 3"/><text x="368" y="142.85" font-size="11" text-anchor="middle">Sequence Number (optional)</text><title>present if S = 1</title><rect x="0" y="154" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="172.85" font-size="11" text-anchor="middle">Payload packet</text><title>e.g. inner IP packet</title></g><metadata id="figdown-source" data-sha256="d3db3271bdbd78faa0c75f722d4ef758c20dec6c067d0a951fd0dee036f6474f"><![CDATA[
figdown 0.1 bitfield
# GRE header — RFC 2784 (base) + RFC 2890 (Key/Sequence extensions)
bitfield gre "GRE Header (RFC 2784/2890)" unit=32 numbering=msb0
field C:1, R:1, K:1, S:1, s:1, Recur:3, Flags:5, Ver:3
field "Protocol Type" 16 color=#dbeafe note="EtherType of the payload"
field "Checksum (optional)" 16 optional note="present if C = 1"
field "Offset (optional)" 16 optional
field "Key (optional)" 32 optional color=#fef9c3 note="present if K = 1"
field "Sequence Number (optional)" 32 optional note="present if S = 1"
field "Payload packet" * note="e.g. inner IP packet"

]]></metadata></svg>