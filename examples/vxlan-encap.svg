y="0">Outer</tspan><tspan x="112" dy="16.900000000000002">IP</tspan><tspan x="112" dy="16.900000000000002">20B</tspan></text></g><g data-node="oudp" data-x="160" data-y="310" style="cursor:move"><rect x="160" y="310" width="49.6" height="52" rx="8" fill="#9aa2ad" stroke="#8a8880"/><text x="184.8" y="332.1" font-size="13" text-anchor="middle" fill="#ffffff"><tspan x="184.8" dy="0">UDP</tspan><tspan x="184.8" dy="16.900000000000002">8B</tspan></text></g><g data-node="vxh" data-x="235" data-y="310" style="cursor:move"><rect x="235" y="310" width="64" height="52" rx="8" fill="#fcd34d" stroke="#ea580c"/><text x="267" y="332.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="267" dy="0">VXLAN</tspan><tspan x="267" dy="16.900000000000002">8B</tspan></text></g><g data-node="dmac2" data-x="330" data-y="310" style="cursor:move"><rect x="330" y="310" width="56.8" height="52" rx="8" fill="#bae6fd" stroke="#8a8880"/><text x="358.4" y="332.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="358.4" dy="0">DMAC</tspan><tspan x="358.4" dy="16.900000000000002">6B</tspan></text></g><g data-node="smac2" data-x="415" data-y="310" style="cursor:move"><rect x="415" y="310" width="56.8" height="52" rx="8" fill="#bae6fd" stroke="#8a8880"/><text x="443.4" y="332.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="443.4" dy="0">SMAC</tspan><tspan x="443.4" dy="16.900000000000002">6B</tspan></text></g><g data-node="etype2" data-x="500" data-y="310" style="cursor:move"><rect x="500" y="310" width="64" height="52" rx="8" fill="#bae6fd" stroke="#8a8880"/><text x="532" y="332.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="532" dy="0">Etype</tspan><tspan x="532" dy="16.900000000000002">2B</tspan></text></g><g data-node="pay2" data-x="580" data-y="310" style="cursor:move"><rect x="580" y="310" width="170" height="60" rx="8" fill="#9aa2ad" stroke="#8a8880"/><text x="665" y="344.55" font-size="13" text-anchor="middle" fill="#ffffff">Payload</text></g><g data-node="crc2" data-x="775" data-y="310" style="cursor:move"><rect x="775" y="310" width="92.8" height="52" rx="8" fill="#bbf7d0" stroke="#16a34a"/><text x="821.4" y="332.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="821.4" dy="0">CRC (new)</tspan><tspan x="821.4" dy="16.900000000000002">4B</tspan></text></g><text x="0" y="406" font-size="13" font-weight="600">Encapsulation overhead (MAC-in-UDP)</text><rect x="0" y="414" width="92.8" height="26" fill="#eeede6" stroke="#c9c7bf" data-cell="overhead:0:1" style="cursor:pointer"/><text x="46.4" y="431.3" font-size="12" text-anchor="middle" font-weight="600">Segment</text><rect x="92.8" y="414" width="56.8" height="26" fill="#eeede6" stroke="#c9c7bf" data-cell="overhead:0:2" style="cursor:pointer"/><text x="121.19999999999999" y="431.3" font-size="12" text-anchor="middle" font-weight="600">Size</text><rect x="149.6" y="414" width="236.8" height="26" fill="#eeede6" stroke="#c9c7bf" data-cell="overhead:0:3" style="cursor:pointer"/><text x="268" y="431.3" font-size="12" text-anchor="middle" font-weight="600">Notes</text><rect x="0" y="440" width="92.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:1:1" style="cursor:pointer"/><text x="7" y="457.3" font-size="12" text-anchor="start">Outer MAC</text><rect x="92.8" y="440" width="56.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:1:2" style="cursor:pointer"/><text x="121.19999999999999" y="457.3" font-size="12" text-anchor="middle">14B</text><rect x="149.6" y="440" width="236.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:1:3" style="cursor:pointer"/><text x="156.6" y="457.3" font-size="12" text-anchor="start">new Ethernet header</text><rect x="0" y="466" width="92.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:2:1" style="cursor:pointer"/><text x="7" y="483.3" font-size="12" text-anchor="start">Outer IP</text><rect x="92.8" y="466" width="56.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:2:2" style="cursor:pointer"/><text x="121.19999999999999" y="483.3" font-size="12" text-anchor="middle">20B</text><rect x="149.6" y="466" width="236.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:2:3" style="cursor:pointer"/><text x="156.6" y="483.3" font-size="12" text-anchor="start">VTEP-to-VTEP</text><rect x="0" y="492" width="92.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:3:1" style="cursor:pointer"/><text x="7" y="509.3" font-size="12" text-anchor="start">UDP</text><rect x="92.8" y="492" width="56.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:3:2" style="cursor:pointer"/><text x="121.19999999999999" y="509.3" font-size="12" text-anchor="middle">8B</text><rect x="149.6" y="492" width="236.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:3:3" style="cursor:pointer"/><text x="156.6" y="509.3" font-size="12" text-anchor="start">dst port 4789</text><rect x="0" y="518" width="92.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:4:1" style="cursor:pointer"/><text x="7" y="535.3" font-size="12" text-anchor="start">VXLAN</text><rect x="92.8" y="518" width="56.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:4:2" style="cursor:pointer"/><text x="121.19999999999999" y="535.3" font-size="12" text-anchor="middle">8B</text><rect x="149.6" y="518" width="236.8" height="26" fill="#fff" stroke="#c9c7bf" data-cell="overhead:4:3" style="cursor:pointer"/><text x="156.6" y="535.3" font-size="12" text-anchor="start">carries the 24-bit VNI</text><rect x="0" y="544" width="92.8" height="26" fill="#fef3c7" stroke="#c9c7bf" data-cell="overhead:5:1" style="cursor:pointer"/><text x="7" y="561.3" font-size="12" text-anchor="start">Total</text><rect x="92.8" y="544" width="56.8" height="26" fill="#fef3c7" stroke="#c9c7bf" data-cell="overhead:5:2" style="cursor:pointer"/><text x="121.19999999999999" y="561.3" font-size="12" text-anchor="middle">50B</text><rect x="149.6" y="544" width="236.8" height="26" fill="#fef3c7" stroke="#c9c7bf" data-cell="overhead:5:3" style="cursor:pointer"/><text x="156.6" y="561.3" font-size="12" text-anchor="start">added to every original frame</text><text x="0" y="614" font-size="13" font-weight="600">Why VXLAN</text><rect x="0" y="622" width="157.6" height="26" fill="#eeede6" stroke="#c9c7bf" data-cell="facts:0:1" style="cursor:pointer"/><text x="78.8" y="639.3" font-size="12" text-anchor="middle" font-weight="600">Fact</text><rect x="157.6" y="622" width="186.4" height="26" fill="#eeede6" stroke="#c9c7bf" data-cell="facts:0:2" style="cursor:pointer"/><text x="250.8" y="639.3" font-size="12" text-anchor="middle" font-weight="600">Value</text><rect x="0" y="648" width="157.6" height="26" fill="#fff" stroke="#c9c7bf" data-cell="facts:1:1" style="cursor:pointer"/><text x="7" y="665.3" font-size="12" text-anchor="start">VLAN address space</text><rect x="157.6" y="648" width="186.4" height="26" fill="#fff" stroke="#c9c7bf" data-cell="facts:1:2" style="cursor:pointer"/><text x="164.6" y="665.3" font-size="12" text-anchor="start">12 bits (4K segments)</text><rect x="0" y="674" width="157.6" height="26" fill="#fff" stroke="#c9c7bf" data-cell="facts:2:1" style="cursor:pointer"/><text x="7" y="691.3" font-size="12" text-anchor="start">VNI address space</text><rect x="157.6" y="674" width="186.4" height="26" fill="#fff" stroke="#c9c7bf" data-cell="facts:2:2" style="cursor:pointer"/><text x="164.6" y="691.3" font-size="12" text-anchor="start">24 bits (16M segments)</text><rect x="0" y="700" width="157.6" height="26" fill="#fff" stroke="#c9c7bf" data-cell="facts:3:1" style="cursor:pointer"/><text x="7" y="717.3" font-size="12" text-anchor="start">Encapsulation</text><rect x="157.6" y="700" width="186.4" height="26" fill="#fff" stroke="#c9c7bf" data-cell="facts:3:2" style="cursor:pointer"/><text x="164.6" y="717.3" font-size="12" text-anchor="start">MAC-in-UDP</text></g><metadata id="figdown-source" data-sha256="cd6b42448b472997bc84b90ac373daefc3c286da0311987550c29e43d41ee450"><![CDATA[
figdown 0.1 block
title "VXLAN Overview — MAC-in-UDP encapsulation"

# ── Classical Ethernet frame ────────────────────────────────────────
group eth "Classical Ethernet Frame"
pin  eth at=40,40
node dmac1 "DMAC\n6B" in=eth color=#bae6fd
pin  dmac1 at=0,0
node smac1 "SMAC\n6B" in=eth color=#bae6fd
pin  smac1 at=85,0
node dot1q "802.1Q\n4B" in=eth color=#bae6fd stroke=#ea580c
pin  dot1q at=170,0
node etype1 "Etype\n2B" in=eth color=#bae6fd
pin  etype1 at=260,0
node pay1 "Payload" in=eth color=#9aa2ad text=#ffffff
size pay1 w=170 h=52
pin  pay1 at=340,0
node crc1 "CRC\n4B" in=eth color=#93c5fd
pin  crc1 at=525,0

# ── VXLAN frame: outer headers + original L2 frame + new CRC ───────
node omac "Outer\nMAC\n14B" color=#fcd34d
pin  omac at=0,260
node oip "Outer\nIP\n20B" color=#fcd34d
pin  oip at=80,260
node oudp "UDP\n8B" color=#9aa2ad text=#ffffff
pin  oudp at=160,260
node vxh "VXLAN\n8B" color=#fcd34d stroke=#ea580c
pin  vxh at=235,260

group orig "Original Layer 2 Frame"
pin  orig at=330,260
node dmac2 "DMAC\n6B" in=orig color=#bae6fd
pin  dmac2 at=0,0
node smac2 "SMAC\n6B" in=orig color=#bae6fd
pin  smac2 at=85,0
node etype2 "Etype\n2B" in=orig color=#bae6fd
pin  etype2 at=170,0
node pay2 "Payload" in=orig color=#9aa2ad text=#ffffff
size pay2 w=170 h=60
pin  pay2 at=250,0
node crc2 "CRC (new)\n4B" color=#bbf7d0 stroke=#16a34a
pin  crc2 at=775,260

# the key idea: the 12-bit VLAN becomes a 24-bit VNI in the VXLAN header
edge dot1q -> vxh label="VNI\n12-bit VLAN → 24-bit VNI" style=dashed color=#ea580c

# ── Supplementary knowledge ─────────────────────────────────────────
table overhead "Encapsulation overhead (MAC-in-UDP)"
| Segment    | Size | Notes                          |
|------------|:----:|--------------------------------|
| Outer MAC  | 14B  | new Ethernet header            |
| Outer IP   | 20B  | VTEP-to-VTEP                   |
| UDP        | 8B   | dst port 4789                  |
| VXLAN      | 8B   | carries the 24-bit VNI         |
| Total      | 50B  | added to every original frame  |
cell 5 highlight

table facts "Why VXLAN"
| Fact                    | Value                    |
|-------------------------|--------------------------|
| VLAN address space      | 12 bits (4K segments)    |
| VNI address space       | 24 bits (16M segments)   |
| Encapsulation           | MAC-in-UDP               |

]]></metadata></svg>