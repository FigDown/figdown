<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 896 766" width="896" height="766" font-family="system-ui,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#bbb" stroke-width="2"/></pattern></defs><g transform="translate(18,6)"><text x="0" y="16" font-size="15" font-weight="600" font-family="var(--sans)">VXLAN Overview — MAC-in-UDP encapsulation</text><g data-group="eth" data-gx="40" data-gy="90" style="cursor:move"><rect x="26" y="64" width="602.6" height="90" rx="10" fill="#f6f5ef" stroke="#d6d4cc"/><text x="36" y="80" font-size="11.5" fill="#6f6e69">Classical Ethernet Frame</text></g><g data-group="orig" data-gx="330" data-gy="310" style="cursor:move"><rect x="316" y="284" width="448" height="98" rx="10" fill="#f6f5ef" stroke="#d6d4cc"/><text x="326" y="300" font-size="11.5" fill="#6f6e69">Original Layer 2 Frame</text></g><line x1="248.1290909090909" y1="142" x2="264.4709090909091" y2="310" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arr)"/><text x="256.3" y="213.85" font-size="11" text-anchor="middle" fill="#ea580c" paint-order="stroke" stroke="#fff" stroke-width="3"><tspan x="256.3" dy="0">VNI</tspan><tspan x="256.3" dy="14.3">12-bit VLAN → 24-bit VNI</tspan></text><g data-node="dmac1" data-x="40" data-y="90" style="cursor:move"><rect x="40" y="90" width="56.8" height="52" rx="8" fill="#bae6fd" stroke="#8a8880"/><text x="68.4" y="112.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="68.4" dy="0">DMAC</tspan><tspan x="68.4" dy="16.900000000000002">6B</tspan></text></g><g data-node="smac1" data-x="125" data-y="90" style="cursor:move"><rect x="125" y="90" width="56.8" height="52" rx="8" fill="#bae6fd" stroke="#8a8880"/><text x="153.4" y="112.