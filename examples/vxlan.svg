/text><text x="402.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">17</text><text x="425.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">18</text><text x="448.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">19</text><text x="471.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">20</text><text x="494.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">21</text><text x="517.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">22</text><text x="540.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">23</text><text x="563.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">24</text><text x="586.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">25</text><text x="609.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">26</text><text x="632.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">27</text><text x="655.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">28</text><text x="678.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">29</text><text x="701.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">30</text><text x="724.5" y="29" font-size="8.5" text-anchor="middle" fill="#6f6e69">31</text><rect x="0" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="11.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="23" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="34.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="46" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="57.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="69" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="80.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="92" y="34" width="23" height="30" fill="#d1fae5" stroke="#555"/><text x="103.5" y="52.85" font-size="11" text-anchor="middle">I</text><title>&quot;VNI</title><rect x="115" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="126.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="138" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="149.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="161" y="34" width="23" height="30" fill="#fff" stroke="#555"/><text x="172.5" y="52.85" font-size="11" text-anchor="middle">R</text><rect x="184" y="34" width="552" height="30" fill="#fff" stroke="#555"/><text x="460" y="52.85" font-size="11" text-anchor="middle">Reserved</text><rect x="0" y="64" width="552" height="30" fill="#dbeafe" stroke="#555"/><text x="276" y="82.85" font-size="11" text-anchor="middle">VNI (VXLAN Network Identifier)</text><rect x="552" y="64" width="184" height="30" fill="#fff" stroke="#555"/><text x="644" y="82.85" font-size="11" text-anchor="middle">Reserved</text><rect x="0" y="94" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="112.85" font-size="11" text-anchor="middle">Inner Ethernet Frame</text><title>&quot;original</title></g><metadata id="figdown-source" data-sha256="e0d40955ad340966a68b84c820a577bda24534e816784d01dc3732123716bf43"><![CDATA[
figdown 0.1 bitfield

# VXLAN Header — RFC 7348, Section 5
# 8 bytes total (two 32-bit words) plus the inner Ethernet frame.

bitfield vxlan_hdr "VXLAN Header (RFC 7348)" unit=32 numbering=msb0

# ── Word 0: Flags (8 bits) + Reserved (24 bits) ─────────────────────────────
field R 1
field R 1
field R 1
field R 1
field I 1 color=#d1fae5 note="VNI valid, MUST be 1"
field R 1
field R 1
field R 1
field "Reserved" 24

# ── Word 1: VNI (24 bits) + Reserved (8 bits) ────────────────────────────────
wrap
field "VNI (VXLAN Network Identifier)" 24 color=#dbeafe
field "Reserved" 8

# ── Payload ───────────────────────────────────────────────────────────────────
wrap
field "Inner Ethernet Frame" 32 note="original L2 frame follows"

]]></metadata></svg>