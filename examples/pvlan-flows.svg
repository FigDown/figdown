<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 623 224" width="623" height="224" font-family="system-ui,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#bbb" stroke-width="2"/></pattern></defs><g transform="translate(18,6)"><line data-edge="19" x1="107.19999999999999" y1="68" x2="170" y2="68" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arr)"/><line data-edge="20" x1="284.4" y1="57.90588235294118" x2="340" y2="48.09411764705882" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arr)"/><line data-edge="21" x1="454.4" y1="38" x2="480.00000000000006" y2="38" stroke="#2563eb" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arr)"/><line data-edge="22" x1="226.48" y1="86" x2="224.32" y2="140" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arr)"/><g data-node="up" data-x="0" data-y="50" style="cursor:move"><rect x="0" y="50" width="107.2" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="53.6" y="72.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Uplink port</text></g><g data-node="pp1" data-x="170" data-y="50" style="cursor:move"><rect x="170" y="50" width="114.4" height="36" fill="#fff" stroke="#8a8880"/><text x="227.2" y="72.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Promisc port</text></g><g data-node="cp1" data-x="340" data-y="20" style="cursor:move"><rect x="340" y="20" width="114.4" height="36" fill="#fff" stroke="#8a8880"/><text x="397.2" y="42.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Community p1</text></g><g data-node="cp2" data-x="480" data-y="20" style="cursor:move"><rect x="480" y="20" width="114.4" height="36" fill="#fff" stroke="#8a8880"/><text x="537.2" y="42.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Community p2</text></g><g data-node="ip1" data-x="170" data-y="140" style="cursor:move"><rect x="170" y="140" width="107.2" height="36" fill="#fff" stroke="#8a8880"/><text x="223.6" y="162.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Isolated p1</text></g><rect x="0" y="197" width="16" height="11" fill="#dc2626" stroke="#555"/><text x="21" y="206.5" font-size="11" fill="#1d1d1b">VID_P — primary VLAN</text><rect x="176" y="197" width="16" height="11" fill="#2563eb" stroke="#555"/><text x="197" y="206.5" font-size="11" fill="#1d1d1b">VID_C — community VLAN</text><rect x="365.2" y="197" width="16" height="11" fill="#16a34a" stroke="#555" stroke-dasharray="6 4"/><text x="386.2" y="206.5" font-size="11" fill="#1d1d1b">VID_I — isolated VLAN</text></g><metadata id="figdown-source" data-sha256="24cf9506bf2afb33fa0ab8bb3905a78d9d25dca741a7f9f814703e718c4636ca"><![CDATA[
figdown 0.1 topology
title Private-VLAN traffic flows — semantic classes + derived legend

# The field-feedback pattern (F1): three flow types distinguished by
# color. Each flow's MEANING is machine-readable via class= — the
# legend strip below is derived automatically from the class lines.
class vidp "VID_P — primary VLAN"   color=#dc2626
class vidc "VID_C — community VLAN" color=#2563eb
class vidi "VID_I — isolated VLAN"  color=#16a34a style=dashed

node up  "Uplink port"    shape=rounded
node pp1 "Promisc port"
node cp1 "Community p1"
node cp2 "Community p2"
node ip1 "Isolated p1"

flow right

edge up  -> pp1 class=vidp
edge pp1 -> cp1 class=vidc
edge cp1 <-> cp2 class=vidc
edge pp1 -> ip1 class=vidi

# --- layout (materialized; delete freely, structure above is complete) ---
# Two rows: top row = uplink / promisc / community ports (left to right);
# bottom row = isolated port below promisc, showing segregation.
# cp1 and cp2 side by side so the peer edge is horizontal.
# ip1 below and between up/pp1 column to visually separate it from community.
# y0=30 (title) so canvas y = 50 + p.fy.
pin up  at=0,30
pin pp1 at=170,30
pin cp1 at=340,0
pin cp2 at=480,0
pin ip1 at=170,120

]]></metadata></svg>