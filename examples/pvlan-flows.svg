<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 476 314" width="476" height="314" font-family="system-ui,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#bbb" stroke-width="2"/></pattern></defs><g transform="translate(18,6)"><text x="0" y="16" font-size="15" font-weight="600" font-family="var(--sans)">Private-VLAN traffic flows — semantic classes + derived legend</text><line x1="107.2" y1="148" x2="163.2" y2="148" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arr)"/><line x1="258.74" y1="130" x2="352.46" y2="86" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arr)"/><line x1="390.8" y1="86" x2="390.8" y2="130" stroke="#2563eb" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arr)"/><line x1="257.93" y1="166" x2="349.67" y2="210" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arr)"/><g data-node="up" data-x="0" data-y="130" style="cursor:move"><rect x="0" y="130" width="107.2" height="36" rx="14" fill="#fff" stroke="#8a8880" stroke-width="1.8"/><text x="53.6" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Uplink port</text></g><g data-node="pp1" data-x="163.2" data-y="130" style="cursor:move"><rect x="163.2" y="130" width="114.4" height="36" fill="#fff" stroke="#8a8880"/><text x="220.39999999999998" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Promisc port</text></g><g data-node="cp1" data-x="333.6" data-y="50" style="cursor:move"><rect x="333.6" y="50" width="114.4" height="36" fill="#fff" stroke="#8a8880"/><text x="390.8" y="72.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Community p1</text></g><g data-node="cp2" data-x="333.6" data-y="130" style="cursor:move"><rect x="333.6" y="130" width="114.4" height="36" fill="#fff" stroke="#8a8880"/><text x="390.8" y="152.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Community p2</text></g><g data-node="ip1" data-x="333.6" data-y="210" style="cursor:move"><rect x="333.6" y="210" width="107.2" height="36" fill="#fff" stroke="#8a8880"/><text x="387.20000000000005" y="232.55" font-size="13" text-anchor="middle" fill="#1d1d1b">Isolated p1</text></g><rect x="0" y="267" width="16" height="11" fill="#dc2626" stroke="#555"/><text x="21" y="276.5" font-size="11" fill="#1d1d1b">VID_P — primary VLAN</text><rect x="176" y="267" width="16" height="11" fill="#2563eb" stroke="#555"/><text x="197" y="276.5" font-size="11" fill="#1d1d1b">VID_C — community VLAN</text><rect x="0" y="287" width="16" height="11" fill="#16a34a" stroke="#555" stroke-dasharray="6 4"/><text x="21" y="296.5" font-size="11" fill="#1d1d1b">VID_I — isolated VLAN</text></g><metadata id="figdown-source" data-sha256="a99fe1dbb27a6206e68bc5f5568a4c93e86afe05af131e4dd4d3f6ac93938cea"><![CDATA[
figdown 0.1 topology
title Private-VLAN traffic flows — semantic classes + derived legend

# The field-feedback pattern (F1): three flow types distinguished by
# color. Each flow's MEANING is machine-readable via class= — the
# legend strip below is derived automatically from the class lines.
class vidp "VID_P — primary VLAN"   color=#dc2626
class vidc "VID_C — community VLAN" color=#2563eb
class vidi "VID_I — isolated VLAN"  color=#16a34a style=dashed

node up  "Uplink port"    shape=rounded
node pp1 "Promisc port"
node cp1 "Community p1"
node cp2 "Community p2"
node ip1 "Isolated p1"

flow right
rank cp1 ip1

edge up  -> pp1 class=vidp
edge pp1 -> cp1 class=vidc
edge cp1 <-> cp2 class=vidc
edge pp1 -> ip1 class=vidi

]]></metadata></svg>