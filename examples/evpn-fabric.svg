10</text><rect x="128" y="330" width="64" height="26" fill="#fee2e2" stroke="#c9c7bf"/><text x="135" y="347.3" font-size="12" text-anchor="start">10010</text><rect x="192" y="330" width="56.8" height="26" fill="#fff" stroke="#c9c7bf"/><text x="199" y="347.3" font-size="12" text-anchor="start">L2</text><rect x="0" y="356" width="71.2" height="26" fill="#fff" stroke="#c9c7bf"/><text x="7" y="373.3" font-size="12" text-anchor="start">Leaf-3</text><rect x="71.2" y="356" width="56.8" height="26" fill="#fff" stroke="#c9c7bf"/><text x="99.6" y="373.3" font-size="12" text-anchor="middle">20</text><rect x="128" y="356" width="64" height="26" fill="#fff" stroke="#c9c7bf"/><text x="135" y="373.3" font-size="12" text-anchor="start">10020</text><rect x="192" y="356" width="56.8" height="26" fill="#fff" stroke="#c9c7bf"/><text x="199" y="373.3" font-size="12" text-anchor="start">L2</text><text x="0" y="426" font-size="13" font-weight="600">Fabric planes</text><rect x="0" y="434" width="136" height="26" fill="#eeede6" stroke="#c9c7bf"/><text x="68" y="451.3" font-size="12" text-anchor="middle" font-weight="600">Plane</text><rect x="136" y="434" width="143.2" height="26" fill="#eeede6" stroke="#c9c7bf"/><text x="207.6" y="451.3" font-size="12" text-anchor="middle" font-weight="600">Protocol</text><rect x="279.2" y="434" width="208" height="26" fill="#eeede6" stroke="#c9c7bf"/><text x="383.2" y="451.3" font-size="12" text-anchor="middle" font-weight="600">Role</text><rect x="0" y="460" width="136" height="26" fill="#fff" stroke="#c9c7bf"/><text x="7" y="477.3" font-size="12" text-anchor="start">Underlay</text><rect x="136" y="460" width="143.2" height="26" fill="#fff" stroke="#c9c7bf"/><text x="143" y="477.3" font-size="12" text-anchor="start">eBGP</text><rect x="279.2" y="460" width="208" height="26" fill="#fff" stroke="#c9c7bf"/><text x="286.2" y="477.3" font-size="12" text-anchor="start">loopback reachability</text><rect x="0" y="486" width="136" height="26" fill="#fff" stroke="#c9c7bf"/><text x="7" y="503.3" font-size="12" text-anchor="start">Overlay control</text><rect x="136" y="486" width="143.2" height="26" fill="#fff" stroke="#c9c7bf"/><text x="143" y="503.3" font-size="12" text-anchor="start">MP-BGP EVPN</text><rect x="279.2" y="486" width="208" height="26" fill="#fff" stroke="#c9c7bf"/><text x="286.2" y="503.3" font-size="12" text-anchor="start">MAC/IP route distribution</text><rect x="0" y="512" width="136" height="26" fill="#fff" stroke="#c9c7bf"/><text x="7" y="529.3" font-size="12" text-anchor="start">Overlay data</text><rect x="136" y="512" width="143.2" height="26" fill="#fff" stroke="#c9c7bf"/><text x="143" y="529.3" font-size="12" text-anchor="start">VXLAN (UDP 4789)</text><rect x="279.2" y="512" width="208" height="26" fill="#fff" stroke="#c9c7bf"/><text x="286.2" y="529.3" font-size="12" text-anchor="start">L2-in-L3 encapsulation</text></g><metadata id="figdown-source" data-sha256="37043eea71cc5718553311b9cf1ed8b9ce5551d30dd3c9d7dcbbc08ab724947e"><![CDATA[
figdown 0.1 topology
title "VXLAN/EVPN Leaf-Spine Fabric — topology with plane notes"

# ── Topology ────────────────────────────────────────────────────────
node sp1 "Spine-1" kind=switch color=#e0e7ff
node sp2 "Spine-2" kind=switch color=#e0e7ff
node lf1 "Leaf-1 (VTEP)" kind=switch
node lf2 "Leaf-2 (VTEP)" kind=switch
node lf3 "Leaf-3 (VTEP)" kind=switch
node h1 "VM-A (VLAN 10)" kind=host
node h2 "VM-B (VLAN 10)" kind=host
node h3 "VM-C (VLAN 20)" kind=host
flow down
rank sp1 sp2
rank lf1 lf2 lf3

# underlay: every leaf peers with every spine
edge sp1 -- lf1 label="eBGP"
edge sp1 -- lf2
edge sp1 -- lf3
edge sp2 -- lf1
edge sp2 -- lf2
edge sp2 -- lf3
edge lf1 -- h1
edge lf2 -- h2
edge lf3 -- h3

# overlay: VXLAN tunnel between the two VTEPs sharing VNI 10010
layer overlay "VXLAN tunnels" z=2
edge lf1 <-> lf2 label="VXLAN VNI 10010" style=dashed color=#dc2626 layer=overlay

# ── Supplementary knowledge ─────────────────────────────────────────
table vni "VNI mapping"
| Leaf   | VLAN | VNI   | Type |
|--------|:----:|-------|------|
| Leaf-1 | 10   | 10010 | L2   |
| Leaf-2 | 10   | 10010 | L2   |
| Leaf-3 | 20   | 10020 | L2   |
cell 1,3 color=#fee2e2
cell 2,3 color=#fee2e2

table planes "Fabric planes"
| Plane           | Protocol          | Role                      |
|-----------------|-------------------|---------------------------|
| Underlay        | eBGP              | loopback reachability     |
| Overlay control | MP-BGP EVPN       | MAC/IP route distribution |
| Overlay data    | VXLAN (UDP 4789)  | L2-in-L3 encapsulation    |

]]></metadata></svg>