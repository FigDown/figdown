rect x="368" y="94" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="112.85" font-size="11" text-anchor="middle">Sequence Number</text><rect x="0" y="124" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="142.85" font-size="11" text-anchor="middle">Data</text><title>Variable-length data payload; echoed back verbatim in reply</title></g><metadata id="figdown-source" data-sha256="1d48a9397b9bc8867dd4e8dcc922d481474951bc508fc901669887550ae305c4"><![CDATA[
figdown 0.1 bitfield
# ICMP Echo Request/Reply Header — RFC 792
title ICMP Echo Header
bitfield icmp "ICMP Echo Request / Reply Header (RFC 792)" unit=32 numbering=msb0
# Row 1: Type (8) + Code (8) + Checksum (16) = 32 bits
field Type 8 note="8 = echo request, 0 = echo reply"
field Code 8
field Checksum 16
# Row 2: Identifier (16) + Sequence Number (16) = 32 bits
field Identifier 16
field "Sequence Number" 16
# Row 3: Data payload (variable length)
field Data * note="Variable-length data payload; echoed back verbatim in reply"

]]></metadata></svg>