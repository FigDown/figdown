="92" height="30" fill="#fff" stroke="#555"/><text x="46" y="172.85" font-size="11" text-anchor="middle">Data Offset</text><rect x="92" y="154" width="92" height="30" fill="#fff" stroke="#555"/><text x="138" y="172.85" font-size="11" text-anchor="middle">Reserved</text><rect x="184" y="154" width="23" height="30" fill="#fff" stroke="#555"/><text x="195.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">CWR</text><rect x="207" y="154" width="23" height="30" fill="#fff" stroke="#555"/><text x="218.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">ECE</text><rect x="230" y="154" width="23" height="30" fill="#fff" stroke="#555"/><text x="241.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">URG</text><rect x="253" y="154" width="23" height="30" fill="#fff" stroke="#555"/><text x="264.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">ACK</text><rect x="276" y="154" width="23" height="30" fill="#fff" stroke="#555"/><text x="287.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">PSH</text><rect x="299" y="154" width="23" height="30" fill="#fff" stroke="#555"/><text x="310.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">RST</text><rect x="322" y="154" width="23" height="30" fill="#fee2e2" stroke="#555"/><text x="333.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">SYN</text><rect x="345" y="154" width="23" height="30" fill="#fee2e2" stroke="#555"/><text x="356.5" y="172.5188172043011" font-size="10.053763440860214" text-anchor="middle">FIN</text><rect x="368" y="154" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="172.85" font-size="11" text-anchor="middle">Window</text><rect x="0" y="184" width="368" height="30" fill="#fff" stroke="#555"/><text x="184" y="202.85" font-size="11" text-anchor="middle">Checksum</text><rect x="368" y="184" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="202.85" font-size="11" text-anchor="middle">Urgent Pointer</text><rect x="0" y="214" width="736" height="30" fill="#fff" stroke="#555" stroke-dasharray="5 3"/><text x="368" y="232.85" font-size="11" text-anchor="middle">Options (if Data Offset &gt; 5)</text><rect x="0" y="244" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="262.85" font-size="11" text-anchor="middle">Data</text><title>Variable-length payload; length inferred from IP datagram</title></g><metadata id="figdown-source" data-sha256="dc1eb7ad9ea2aa68e9051ce03b2c34e6024f2d238abb12919edcff602ff5b18e"><![CDATA[
figdown 0.1 bitfield
# TCP Header — RFC 9293 §3.1
title TCP Header

bitfield tcp "TCP Header (RFC 9293)" unit=32 numbering=msb0
# Row 1: Source Port (16) + Destination Port (16) = 32 bits
field "Source Port" 16
field "Destination Port" 16
# Row 2: Sequence Number = 32 bits
field "Sequence Number" 32
# Row 3: Acknowledgment Number = 32 bits
field "Acknowledgment Number" 32
# Row 4: Data Offset (4) + Reserved (4) + 8 flags + Window (16) = 32 bits
field "Data Offset" 4
field Reserved 4
field CWR:1, ECE:1, URG:1, ACK:1, PSH:1, RST:1
field SYN 1 color=#fee2e2
field FIN 1 color=#fee2e2
field Window 16
# Row 5: Checksum (16) + Urgent Pointer (16) = 32 bits
field Checksum 16
field "Urgent Pointer" 16
# Row 6: Options (variable, shown as one 32-bit row) — optional
field "Options (if Data Offset > 5)" 32 optional
# Row 7: Data payload (variable, shown as one 32-bit row)
field Data * note="Variable-length payload; length inferred from IP datagram"

]]></metadata></svg>