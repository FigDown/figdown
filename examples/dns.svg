"11" text-anchor="middle">ID</text><title>Identifier assigned by the program that generates the query; copied into the reply</title><rect x="0" y="64" width="28" height="30" fill="#fff" stroke="#555"/><text x="14" y="82.85" font-size="11" text-anchor="middle">QR</text><rect x="28" y="64" width="112" height="30" fill="#fff" stroke="#555"/><text x="84" y="82.85" font-size="11" text-anchor="middle">Opcode</text><rect x="140" y="64" width="28" height="30" fill="#fff" stroke="#555"/><text x="154" y="82.85" font-size="11" text-anchor="middle">AA</text><rect x="168" y="64" width="28" height="30" fill="#fff" stroke="#555"/><text x="182" y="82.85" font-size="11" text-anchor="middle">TC</text><rect x="196" y="64" width="28" height="30" fill="#fff" stroke="#555"/><text x="210" y="82.85" font-size="11" text-anchor="middle">RD</text><rect x="224" y="64" width="28" height="30" fill="#fff" stroke="#555"/><text x="238" y="82.85" font-size="11" text-anchor="middle">RA</text><rect x="252" y="64" width="84" height="30" fill="#fff" stroke="#555"/><text x="294" y="82.85" font-size="11" text-anchor="middle">Z</text><rect x="336" y="64" width="112" height="30" fill="#fff" stroke="#555"/><text x="392" y="82.85" font-size="11" text-anchor="middle">RCODE</text><rect x="0" y="94" width="448" height="30" fill="#fff" stroke="#555"/><text x="224" y="112.85" font-size="11" text-anchor="middle">QDCOUNT</text><title>Number of entries in the question section</title><rect x="0" y="124" width="448" height="30" fill="#fff" stroke="#555"/><text x="224" y="142.85" font-size="11" text-anchor="middle">ANCOUNT</text><title>Number of resource records in the answer section</title><rect x="0" y="154" width="448" height="30" fill="#fff" stroke="#555"/><text x="224" y="172.85" font-size="11" text-anchor="middle">NSCOUNT</text><title>Number of name server resource records in the authority section</title><rect x="0" y="184" width="448" height="30" fill="#fff" stroke="#555"/><text x="224" y="202.85" font-size="11" text-anchor="middle">ARCOUNT</text><title>Number of resource records in the additional records section</title><rect x="0" y="214" width="448" height="30" fill="#fff" stroke="#555"/><text x="224" y="232.85" font-size="11" text-anchor="middle">Question / Answer / Authority / Additional sections</text><title>Variable-length sections follow the header; see RFC 1035 §4.1.2–4.1.4</title></g><metadata id="figdown-source" data-sha256="2896a8ab2b0c8d7d932139e5ae001859a53f332247c4da932b1080adc39dce3f"><![CDATA[
figdown 0.1 bitfield

# DNS Message Header — RFC 1035 §4.1.1
# Each row is 16 bits, MSB-0 numbering (bit 0 at left).

bitfield dns "DNS Message Header (RFC 1035)" unit=16 numbering=msb0

# Row 1: Transaction ID
field ID 16 note="Identifier assigned by the program that generates the query; copied into the reply"

# Row 2: Flags (QR + Opcode + AA + TC + RD + RA + Z + RCODE = 16 bits)
field QR:1, Opcode:4, AA:1, TC:1, RD:1, RA:1, Z:3, RCODE:4

# Row 3: Question Count
field QDCOUNT 16 note="Number of entries in the question section"

# Row 4: Answer Record Count
field ANCOUNT 16 note="Number of resource records in the answer section"

# Row 5: Authority Record Count
field NSCOUNT 16 note="Number of name server resource records in the authority section"

# Row 6: Additional Record Count
field ARCOUNT 16 note="Number of resource records in the additional records section"

# Variable-length sections (one representative row each)
wrap
field "Question / Answer / Authority / Additional sections" * note="Variable-length sections follow the header; see RFC 1035 §4.1.2–4.1.4"

]]></metadata></svg>