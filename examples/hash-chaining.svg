<text x="39.2" y="108.55" font-size="13" text-anchor="middle" fill="#1d1d1b">[ 1 ] •</text></g><g data-node="b2" data-x="0" data-y="122" style="cursor:move"><rect x="0" y="122" width="78.4" height="36" fill="#f1f5f9" stroke="#8a8880"/><text x="39.2" y="144.55" font-size="13" text-anchor="middle" fill="#1d1d1b">[ 2 ] •</text></g><g data-node="b3" data-x="0" data-y="158" style="cursor:move"><rect x="0" y="158" width="100" height="36" fill="#f1f5f9" stroke="#8a8880"/><text x="50" y="180.55" font-size="13" text-anchor="middle" fill="#1d1d1b">[ 3 ] null</text></g><g data-node="e1a" data-x="0" data-y="238" style="cursor:move"><rect x="0" y="238" width="92.8" height="68" fill="#dbeafe" stroke="#8a8880"/><text x="46.4" y="259.65000000000003" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="46.4" dy="0">key=alpha</tspan><tspan x="46.4" dy="16.900000000000002">val=42</tspan><tspan x="46.4" dy="16.900000000000002">next •</tspan></text></g><g data-node="e1b" data-x="0" data-y="350" style="cursor:move"><rect x="0" y="350" width="92.8" height="68" fill="#dbeafe" stroke="#8a8880"/><text x="46.4" y="371.65000000000003" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="46.4" dy="0">key=gamma</tspan><tspan x="46.4" dy="16.900000000000002">val=7</tspan><tspan x="46.4" dy="16.900000000000002">next null</tspan></text></g><g data-node="e2a" data-x="0" data-y="462" style="cursor:move"><rect x="0" y="462" width="92.8" height="68" fill="#dcfce7" stroke="#8a8880"/><text x="46.4" y="483.65000000000003" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="46.4" dy="0">key=beta</tspan><tspan x="46.4" dy="16.900000000000002">val=99</tspan><tspan x="46.4" dy="16.900000000000002">next null</tspan></text></g></g><metadata id="figdown-source" data-sha256="6c23ef413b75ef29a50a5a14528447517e0585273151bbbc202b41aa0a9a5a0c"><![CDATA[
figdown 0.1 block
title "Hash table with chaining"

# Static data-structure figure: a hash table of 4 buckets where
# collisions are resolved by a linked list (separate chaining).
#   bucket[0] — empty
#   bucket[1] — 2-node chain  (two keys hashed to slot 1)
#   bucket[2] — 1-node chain  (one key in slot 2)
#   bucket[3] — empty
# The bucket array is a fixed-size slot group; each chain entry node
# holds a key/value pair and a next-pointer edge to the successor.

group table "Bucket array" gap=0
node b0 "[ 0 ] null" in=table color=#f1f5f9
node b1 "[ 1 ] •"    in=table color=#f1f5f9
node b2 "[ 2 ] •"    in=table color=#f1f5f9
node b3 "[ 3 ] null" in=table color=#f1f5f9

# chain for bucket 1 — two entries
node e1a "key=alpha\nval=42\nnext •" color=#dbeafe
node e1b "key=gamma\nval=7\nnext null" color=#dbeafe

# chain for bucket 2 — one entry
node e2a "key=beta\nval=99\nnext null" color=#dcfce7

flow right
rank b0 b1 b2 b3
rank e1a e2a

# bucket pointers into chain heads
edge b1 -[ptr]-> e1a
edge b2 -[ptr]-> e2a

# chain links
edge e1a -[next]-> e1b

]]></metadata></svg>