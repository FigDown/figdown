="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="112.85" font-size="11" text-anchor="middle">xid</text><rect x="0" y="124" width="368" height="30" fill="#fff" stroke="#555"/><text x="184" y="142.85" font-size="11" text-anchor="middle">secs</text><rect x="368" y="124" width="368" height="30" fill="#fff" stroke="#555"/><text x="552" y="142.85" font-size="11" text-anchor="middle">flags</text><rect x="0" y="154" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="172.85" font-size="11" text-anchor="middle">ciaddr</text><rect x="0" y="184" width="736" height="30" fill="#d1fae5" stroke="#555"/><text x="368" y="202.85" font-size="11" text-anchor="middle">yiaddr</text><title>your (client) IP address</title><rect x="0" y="214" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="232.85" font-size="11" text-anchor="middle">siaddr</text><rect x="0" y="244" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="262.85" font-size="11" text-anchor="middle">giaddr</text><rect x="0" y="274" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="292.85" font-size="11" text-anchor="middle">chaddr (16 bytes)</text><title>client hardware address</title><rect x="0" y="304" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="322.85" font-size="11" text-anchor="middle">sname (64 bytes)</text><title>server host name</title><rect x="0" y="334" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="352.85" font-size="11" text-anchor="middle">file (128 bytes)</text><title>boot file name</title><rect x="0" y="364" width="736" height="30" fill="#fff" stroke="#555"/><text x="368" y="382.85" font-size="11" text-anchor="middle">options (variable)</text><title>magic cookie 99.130.83.99 then options; option 53 = DHCP message type</title></g><metadata id="figdown-source" data-sha256="50040af25fe4e7f397adce737f1aec5e42f5e8cfd9effa96b02e014cb36f15dd"><![CDATA[
figdown 0.1 bitfield
# DHCP Message Format — RFC 2131 (BOOTP layout)
title DHCP Message

bitfield dhcp "DHCP Message (RFC 2131)" unit=32 numbering=msb0

# Row 1: op(8) + htype(8) + hlen(8) + hops(8) = 32 bits
field op 8 note="1 = BOOTREQUEST, 2 = BOOTREPLY"
field htype 8
field hlen 8
field hops 8

# Row 2: xid = 32 bits
field xid 32

# Row 3: secs(16) + flags(16) = 32 bits
field secs 16
field flags 16

# Row 4: ciaddr = 32 bits
field ciaddr 32

# Row 5: yiaddr = 32 bits
field yiaddr 32 color=#d1fae5 note="your (client) IP address"

# Row 6: siaddr = 32 bits
field siaddr 32

# Row 7: giaddr = 32 bits
field giaddr 32

# Row 8: chaddr (16 bytes, shown as one 32-bit representative row)
field "chaddr (16 bytes)" 32 note="client hardware address"

# Row 9: sname (64 bytes, shown as one 32-bit representative row)
field "sname (64 bytes)" 32 note="server host name"

# Row 10: file (128 bytes, shown as one 32-bit representative row)
field "file (128 bytes)" 32 note="boot file name"

# Row 11: options (variable)
field "options (variable)" * note="magic cookie 99.130.83.99 then options; option 53 = DHCP message type"

]]></metadata></svg>