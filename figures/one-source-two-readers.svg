xt-anchor="middle" fill="#1d1d1b"><tspan x="668.6" dy="0">ingress.svg</tspan><tspan x="668.6" dy="16.900000000000002">(artifact)</tspan></text></g><g data-node="human" data-x="855" data-y="70" style="cursor:move"><ellipse cx="912.2" cy="88" rx="57.2" ry="18" fill="#fff" stroke="#8a8880"/><text x="912.2" y="92.55" font-size="13" text-anchor="middle" fill="#1d1d1b">human reader</text></g><g data-node="agent" data-x="110" data-y="200" style="cursor:move"><ellipse cx="152.8" cy="218" rx="42.8" ry="18" fill="#fef9c3" stroke="#8a8880"/><text x="152.8" y="222.55" font-size="13" text-anchor="middle" fill="#1d1d1b">AI agent</text></g><text x="250.2" y="91" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">deterministic build</text><text x="250.2" y="91" font-size="11" text-anchor="middle" fill="#555">deterministic build</text><text x="544.1" y="91" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">stable SVG</text><text x="544.1" y="91" font-size="11" text-anchor="middle" fill="#555">stable SVG</text><text x="788.6" y="87.05911330049261" font-size="11" text-anchor="middle" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">reads visually</text><text x="788.6" y="87.05911330049261" font-size="11" text-anchor="middle" fill="#555">reads visually</text><text x="132.88852459016394" y="165" font-size="11" text-anchor="start" fill="#fff" stroke="#fff" stroke-width="3" stroke-linejoin="round">reads for meaning</text><text x="132.88852459016394" y="165" font-size="11" text-anchor="start" fill="#555">reads for meaning</text></g><metadata id="figdown-source" data-sha256="26f3e3a323d6528d0cf6fbf9f7203cfcf7bda1a65e7606f438012f15f777da7a"><![CDATA[
figdown 0.1 block
title "One source, two readers"

# A single .fd file is the source of truth.
# It feeds two completely different reading paths:
#   (a) deterministic renderer  ->  SVG artifact  ->  human
#   (b) AI agent reads the .fd directly for meaning

node src  "ingress.fd\n(source of truth)"  shape=rounded  color=#e0e7ff
node rend "FigDown renderer\n(build-svg.js)"
node svg  "ingress.svg\n(artifact)"        shape=rounded  color=#dcfce7
node human "human reader"                  shape=ellipse
node agent "AI agent"                      shape=ellipse   color=#fef9c3

flow right
rank svg human

edge src  -[deterministic build]->  rend
edge rend -[stable SVG]->           svg
edge svg  -[reads visually]->       human
edge src  -[reads for meaning]->    agent

# --- layout (auto-generated; strip to reset) ---
pin src   at=20,20
pin rend  at=330,20
pin svg   at=615,20
pin human at=855,20
pin agent at=110,150

]]></metadata></svg>