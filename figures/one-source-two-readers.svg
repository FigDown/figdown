"0">ingress.fd</tspan><tspan x="95.2" dy="16.900000000000002">(source of truth)</tspan></text></g><g data-node="rend" data-x="200" data-y="70" style="cursor:move"><rect x="200" y="70" width="143.2" height="52" fill="#fff" stroke="#8a8880"/><text x="271.6" y="92.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="271.6" dy="0">FigDown renderer</tspan><tspan x="271.6" dy="16.900000000000002">(build-svg.js)</tspan></text></g><g data-node="svg" data-x="370" data-y="70" style="cursor:move"><rect x="370" y="70" width="107.2" height="52" rx="14" fill="#dcfce7" stroke="#8a8880" stroke-width="1.8"/><text x="423.6" y="92.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="423.6" dy="0">ingress.svg</tspan><tspan x="423.6" dy="16.900000000000002">(artifact)</tspan></text></g><g data-node="human" data-x="535" data-y="70" style="cursor:move"><ellipse cx="592.2" cy="88" rx="57.2" ry="18" fill="#fff" stroke="#8a8880"/><text x="592.2" y="92.55" font-size="13" text-anchor="middle" fill="#1d1d1b">human reader</text></g><g data-node="agent" data-x="110" data-y="190" style="cursor:move"><ellipse cx="152.8" cy="208" rx="42.8" ry="18" fill="#fef9c3" stroke="#8a8880"/><text x="152.8" y="212.55" font-size="13" text-anchor="middle" fill="#1d1d1b">AI agent</text></g></g><metadata id="figdown-source" data-sha256="0c3a797f04598e769ce7f2e81d4f29b6a70e5123603032009717d74cc0abd5cf"><![CDATA[
figdown 0.1 block
title "One source, two readers"

# A single .fd file is the source of truth.
# It feeds two completely different reading paths:
#   (a) deterministic renderer  ->  SVG artifact  ->  human
#   (b) AI agent reads the .fd directly for meaning

node src  "ingress.fd\n(source of truth)"  shape=rounded  color=#e0e7ff
node rend "FigDown renderer\n(build-svg.js)"
node svg  "ingress.svg\n(artifact)"        shape=rounded  color=#dcfce7
node human "human reader"                  shape=ellipse
node agent "AI agent"                      shape=ellipse   color=#fef9c3

flow right
rank svg human

edge src  -[deterministic build]->  rend
edge rend -[stable SVG]->           svg
edge svg  -[reads visually]->       human
edge src  -[reads for meaning]->    agent

# --- layout (auto-generated; strip to reset) ---
pin src   at=20,20
pin rend  at=200,20
pin svg   at=370,20
pin human at=535,20
pin agent at=110,140

]]></metadata></svg>