="0">ingress.fd</tspan><tspan x="75.2" dy="16.900000000000002">(source of truth)</tspan></text></g><g data-node="rend" data-x="206.4" data-y="130" style="cursor:move"><rect x="206.4" y="130" width="143.2" height="52" fill="#fff" stroke="#8a8880"/><text x="278" y="152.10000000000002" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="278" dy="0">FigDown renderer</tspan><tspan x="278" dy="16.900000000000002">(build-svg.js)</tspan></text></g><g data-node="svg" data-x="405.6" data-y="50" style="cursor:move"><rect x="405.6" y="50" width="107.2" height="52" rx="14" fill="#dcfce7" stroke="#8a8880" stroke-width="1.8"/><text x="459.20000000000005" y="72.1" font-size="13" text-anchor="middle" fill="#1d1d1b"><tspan x="459.20000000000005" dy="0">ingress.svg</tspan><tspan x="459.20000000000005" dy="16.900000000000002">(artifact)</tspan></text></g><g data-node="human" data-x="405.6" data-y="146" style="cursor:move"><ellipse cx="462.8" cy="164" rx="57.2" ry="18" fill="#fff" stroke="#8a8880"/><text x="462.8" y="168.55" font-size="13" text-anchor="middle" fill="#1d1d1b">human reader</text></g><g data-node="agent" data-x="405.6" data-y="226" style="cursor:move"><ellipse cx="448.40000000000003" cy="244" rx="42.8" ry="18" fill="#fef9c3" stroke="#8a8880"/><text x="448.40000000000003" y="248.55" font-size="13" text-anchor="middle" fill="#1d1d1b">AI agent</text></g></g><metadata id="figdown-source" data-sha256="598202235eec7f8e7f8d9ee6044cdbaa5b71c8a84290eff758271721f1a528b6"><![CDATA[
figdown 0.1 block
title "One source, two readers"

# A single .fd file is the source of truth.
# It feeds two completely different reading paths:
#   (a) deterministic renderer  ->  SVG artifact  ->  human
#   (b) AI agent reads the .fd directly for meaning

node src  "ingress.fd\n(source of truth)"  shape=rounded  color=#e0e7ff
node rend "FigDown renderer\n(build-svg.js)"
node svg  "ingress.svg\n(artifact)"        shape=rounded  color=#dcfce7
node human "human reader"                  shape=ellipse
node agent "AI agent"                      shape=ellipse   color=#fef9c3

flow right
rank svg human

edge src  -[deterministic build]->  rend
edge rend -[stable SVG]->           svg
edge svg  -[reads visually]->       human
edge src  -[reads for meaning]->    agent

]]></metadata></svg>